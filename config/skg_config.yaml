# SKG Platform Configuration — /etc/skg/skg_config.yaml
gravity:
  autostart: false
  cycle_interval_s: 120
  convergence_epsilon: 0.01

sensors:
  enabled:
    - usb
    - ssh
    - agent
    - msf
    - cve
    - bloodhound
    - web
    - data
  usb:
    drops_dir: /var/lib/skg/usb_drops
  ssh:
    timeout_s: 30
    collect_interval_s: 300
  agent:
    queue_dir: /var/lib/skg/agent_queue
  msf:
    host: 127.0.0.1
    port: 55553
    user: msf
    password: "${MSF_PASSWORD}"
    loot_dir: ~/.msf4/loot
  cve:
    nvd_api_key: "${NIST_NVD_API_KEY}"
    packages:
      - log4j
      - log4j2
      - docker
      - containerd
      - runc
      - openssl
      - spring-core
      - apache-struts
  bloodhound:
    # BloodHound CE REST API (primary)
    url: "http://localhost:8080"
    username: "admin"
    password: "${BH_PASSWORD}"
    # Optional: filter to specific domain
    # domain_sid: "S-1-5-21-..."
    collect_interval_s: 900
    attack_path_id: ad_kerberoast_v1
    # Fallback: Neo4j bolt direct
    # neo4j_url: "bolt://localhost:7687"
    # neo4j_user: "neo4j"
    # neo4j_password: "${NEO4J_PASSWORD}"

resonance:
  embedding:
    # Local-only mode: avoid sentence-transformers remote model fetches.
    # Uses the built-in TF-IDF embedder for resonance memory search.
    offline: true
    # Optional: also force TF-IDF even if offline is false.
    prefer_tfidf: true

  ollama:
    url: "http://localhost:11434"
    model: "tinyllama:latest"
    temperature: 0.1
    # generation_timeout_s: how long to wait for catalog/adapter generation (Ollama).
    # CPU-only with tinyllama is ~0.3 tok/s — 512 tokens takes ~1700s.
    # Set ANTHROPIC_API_KEY in /etc/skg/skg.env for Claude-backed generation instead.
    # Better local models: ollama pull qwen2.5:0.5b  (faster) or llama3.2:3b (better)
    generation_timeout_s: 900

  # ── Multi-LLM fiber pool ────────────────────────────────────────────────────
  # Dispatches inference requests across multiple backends concurrently.
  # strategy:
  #   race        — all backends start in parallel; first valid response wins
  #   round_robin — rotate across backends (load balancing)
  #   ensemble    — all backends run; longest valid response used as primary
  # When disabled (or not configured), falls back to the single resonance.ollama backend.
  llm_pool:
    enabled: false
    strategy: race
    max_workers: 4
    backends:
      # Primary: tinyllama (fast, low quality — good for real-time assistant)
      - type: ollama
        url: "http://localhost:11434"
        model: "tinyllama:latest"
        temperature: 0.1
        generation_timeout_s: 900
      # Secondary: llama3.2:3b (better reasoning — catalog/proposal drafting)
      # Enable after: ollama pull llama3.2:3b
      # - type: ollama
      #   url: "http://localhost:11434"
      #   model: "llama3.2:3b"
      #   temperature: 0.1
      #   generation_timeout_s: 900
      # Cloud fallback: Anthropic API (requires ANTHROPIC_API_KEY in /etc/skg/skg.env)
      # - type: anthropic
      #   model: "claude-haiku-4-5-20251001"
      #   max_tokens: 1024
      # HuggingFace Inference API (requires HF_API_KEY in /etc/skg/skg.env)
      # Free tier available; good for structured JSON output tasks.
      # Good open models: mistralai/Mistral-7B-Instruct-v0.3, microsoft/Phi-3-mini-4k-instruct
      # - type: huggingface
      #   model: "mistralai/Mistral-7B-Instruct-v0.3"
      #   max_new_tokens: 512
      #   temperature: 0.1
      #   timeout_s: 120

  # ── Layered local assistant (router + memory + tiered models) ─────────────
  # fast_model: planner + general low-latency prompts
  # code_model: code-heavy prompts
  # deep_model: longer analysis prompts
  orchestrator:
    fast_model: "hermes3:3b"
    code_model: "qwen2.5-coder:1.5b"
    deep_model: "gemma4:e2b-it-q4_K_M"
    fast_fallback_models:
      - "gemma3:1b"
    code_fallback_models:
      - "gemma3:1b"
    deep_fallback_models:
      - "gpt-oss:20b"
      - "gemma3:1b"
    fast_num_predict: 192
    code_num_predict: 256
    deep_num_predict: 512
    rag_k_each: 3
    max_context_lines: 12
    deep_char_threshold: 320
    deep_token_threshold: 60

  # ── Layered MCP threading (SKG as source-of-truth) ───────────────────────
  # Runs memory + instrument + capability threads in parallel, then reasons.
  mcp_threading:
    enabled: true
    k_each: 3
    adapter_k: 8
    max_workers: 4
    capability_scan: true
    max_help_cmds: 6
    max_man_cmds: 4
    max_context_lines: 12
    selector_top_n: 3
    selector_min_score: 0.05
    advisory_only: true

  # ── SphereGPU v0 (virtual local accelerator) ───────────────────────────────
  # Spherical scheduler over local models; does not require cloud APIs.
  sphere_gpu:
    enabled: true
    virtual_cores: 4
    shell_inner_max: 2
    shell_mid_max: 1
    shell_outer_max: 1
    cache_size: 96
    default_k_each: 3
    mid_r_threshold: 0.34
    outer_r_threshold: 0.67
    uncertainty_escalation_phi: 0.72
    persist_state: true
    # state_path: "/var/lib/skg/resonance/sphere_gpu_state.json"
    persist_response_chars: 8000
    enable_resource_guard: true
    load_guard_warn_ratio: 1.2
    load_guard_hard_ratio: 1.8
    mem_guard_warn_ratio: 0.12
    mem_guard_hard_ratio: 0.08
    swap_guard_warn_ratio: 0.30
    swap_guard_hard_ratio: 0.55
    enable_auto_local_corpus: true
    auto_local_index_interval_s: 1800
    auto_local_max_help_cmds: 12
    auto_local_max_man_cmds: 8
    auto_local_max_code_files: 220
    auto_local_chunk_chars: 900
    auto_local_max_pearl_records: 500
    auto_local_include_pearls: true
    enable_micro_local_corpus: true
    micro_local_ttl_s: 900
    micro_local_max_help_cmds: 2
    micro_local_max_man_cmds: 2
    micro_local_max_code_files: 3
    micro_local_chunk_chars: 700

  assistant:
    enabled: true
    timeout_s: 4.0
    num_predict: 160
    tasks:
      target_summary: "Explain the measured target shape, strongest current paths, and bounded next observations."
      fold_explanation: "Explain why the fold exists, what is missing, and whether the pressure is re-observation or growth."
      proposal_explanation: "Explain why this proposal exists, what it would change, and what evidence or memory reinforces it."
      memory_summary: "Explain what the pearl neighborhood reinforces and how it should bias observation without assigning new state."
      next_observation: "Recommend the next bounded observation using folds, measured support, reinforced wickets, and timeline change without assigning new state."
      engagement_note: "Draft a concise operator engagement note that preserves uncertainty, current measured state, and immediate next steps."
      fold_cluster_summary: "Summarize clustered fold and growth pressure as one structural deficit, not a list of separate alerts."
      what_if: "Evaluate the proposed action as a counterfactual over current SKG state. Predict only likely effects on uncertainty, folds, proposals, graph pressure, or observation priority, and never treat the action as already executed."

  web:
    timeout_s: 30
    collect_interval_s: 600
    max_probe_paths: 60
    # Tor SOCKS5 proxy for .onion targets
    tor_proxy: "socks5://127.0.0.1:9050"
    tor_timeout_s: 60

  data:
    collect_interval_s: 300
    sources: []
    # Add your data sources here. Example:
    #
    # sources:
    #   - url: postgresql://user:pass@localhost/mydb
    #     table: orders
    #     workload_id: banking::orders
    #     contract: /etc/skg/contracts/orders.json
    #     attack_path_id: data_completeness_failure_v1
    #     ttl_hours: 24
    #
    #   - url: sqlite:///var/lib/myapp/data.db
    #     table: sensor_readings
    #     workload_id: agriculture::sensor_readings
    #     attack_path_id: data_drift_undetected_v1
    #
    # Pipeline topology bonds (optional — same_database inferred automatically):
    # pipeline_topology:
    #   - from: banking::raw_transactions
    #     to:   banking::orders
    #     type: upstream_of
    #   - from: banking::orders
    #     to:   banking::daily_summary
    #     type: derived_from

# ── Cognitive probe (AI/LLM metacognition attack surface) ─────────────────
# Probes LLM endpoints for MC-01..MC-08 metacognitive preconditions.
# Set backend: openai | anthropic | local
# For local Ollama: api_base: http://localhost:11434, backend: local
cognitive_probe:
  enabled: false          # set true to activate on AI-domain targets
  backend: local          # openai | anthropic | local
  api_base: http://localhost:11434
  model: llama3
  temperature: 0.0
  collect_interval_s: 3600
  max_retries: 3
  retry_delay_s: 5
  # probe_set: /opt/skg/skg-metacognition-toolchain/contracts/catalogs/default_probes.yaml
  # api_key: ""  # set ANTHROPIC_API_KEY or OPENAI_API_KEY env var instead
