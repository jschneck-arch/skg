# SKG Target Configuration — /etc/skg/targets.yaml
targets:
  - host: 192.168.1.10
    method: ssh
    user: ops
    key: ~/.ssh/id_rsa
    workload_id: linux-web-01
    attack_path_id: log4j_jndi_rce_v1
    enabled: true
    tags: [linux, web]

