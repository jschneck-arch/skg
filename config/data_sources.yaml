# /etc/skg/data_sources.yaml
# Data pipeline sources for SKG monitoring
# chmod 640 /etc/skg/data_sources.yaml after editing

data_sources:

  # ── Banking example ────────────────────────────────────────────────────
  # - url: postgresql://skg_reader:${DB_PASSWORD}@localhost/banking
