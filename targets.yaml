# SKG Targets — example configuration
#
# Copy this file to /etc/skg/targets.yaml and fill in real values.
# Use /etc/skg/skg.env for credentials (never store passwords in plain text
# in a file that might be committed to version control).
#
# Environment variables are expanded: ${MY_PASSWORD} reads from the environment.
# Set them in /etc/skg/skg.env (chmod 600).
#
# All targets are opt-in via `enabled: true`.

targets:

  # ── Linux host via SSH (key auth) ─────────────────────────────────────────

  - host: 192.168.1.10
    method: ssh
    user: root
    key: ~/.ssh/id_rsa          # tilde is expanded automatically
    workload_id: linux-host-01
    enabled: false
    domains: [host, web]
    tags: [linux, ssh, lab]
    notes: "Replace with your lab Linux host"

  # ── Linux host via SSH (password auth) ────────────────────────────────────

  - host: 192.168.1.11
    method: ssh
    user: kali
    password: "${SSH_PASSWORD}"  # set SSH_PASSWORD in /etc/skg/skg.env
    workload_id: linux-host-02
    enabled: false
    domains: [host]
    tags: [linux, ssh]
    notes: "Password auth example — prefer key auth"

  # ── Windows Server via WinRM ───────────────────────────────────────────────

  - host: 192.168.1.20
    method: winrm
    workload_id: windows-server-01
    enabled: false
    domains: [host, smb, rdp]
    tags: [windows, winrm, smb, rdp]
    auth:
      user: Administrator
      password: "${WINRM_PASSWORD}"   # set WINRM_PASSWORD in /etc/skg/skg.env
    notes: "Windows Server — WinRM port 5985, SMB, RDP"

  # ── Web-only target (no SSH, HTTP surface scan) ───────────────────────────

  - host: 192.168.1.30
    method: http
    url: http://192.168.1.30/
    workload_id: web-app-01
    enabled: false
    domains: [web]
    tags: [web, http, lab]
    notes: "Web application — HTTP surface, no SSH required"

  # ── BloodHound CE (AD graph) ───────────────────────────────────────────────
  # Enable only if you have BloodHound CE running locally.
  #
  # - host: 127.0.0.1
  #   method: http
  #   url: http://localhost:8080
  #   workload_id: bloodhound-local
  #   enabled: false
  #   tags: [bloodhound, ad, graph]
  #   auth:
  #     user: admin
  #     password: "${BH_PASSWORD}"   # set BH_PASSWORD in /etc/skg/skg.env
  #   notes: "BloodHound CE — AD lateral movement graph"

  # ── Metasploitable 2 (classic lab target) ─────────────────────────────────
  # A pre-configured vulnerable VM for testing the full engagement loop.
  # Download: https://sourceforge.net/projects/metasploitable/
  #
