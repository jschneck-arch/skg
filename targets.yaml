  #   method: ssh
  #   user: msfadmin
  #   password: msfadmin
  #   workload_id: metasploitable2
  #   enabled: false
  #   domains: [host, web, data]
  #   tags: [metasploitable, linux, ssh, web, ftp]
  #   notes: "Metasploitable 2 — intentionally vulnerable Linux VM"
